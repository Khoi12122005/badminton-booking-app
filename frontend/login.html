<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - CourtFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="grid-overlay"></div>

    <div class="page-shell auth-wrapper">
      <main class="auth-card">
        <div class="brand-mark">CF</div>
        <h1>Chào mừng trở lại</h1>
        <p>Đăng nhập để đặt sân và xem lịch sử</p>

        <div id="global-message" class="message hidden" role="alert"></div>

        <form id="login-form" class="auth-form">
          <label class="field">
            <span>Tên đăng nhập</span>
            <input id="username" name="username" type="text" placeholder="Nhập tên đăng nhập" required />
          </label>

          <label class="field">
            <span>Mật khẩu</span>
            <input id="password" name="password" type="password" placeholder="••••••••" required />
          </label>

          <button id="login-btn" class="primary-btn primary-btn-wide" type="submit">
            Đăng nhập
          </button>
        </form>

        <div class="auth-footer">
          Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a>
        </div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
