<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Đăng nhập - CourtFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="ambient ambient-three"></div>
    <div class="grid-overlay"></div>

    <div class="page-shell auth-wrapper">
      <main class="auth-card">
        <div class="brand-mark" style="background: linear-gradient(135deg, #1f2937 0%, #111827 100%);">AD</div>
        <h1>Admin Workspace</h1>
        <p>Khu vực quản lý dành riêng cho ban vận hành</p>

        <div id="global-message" class="message hidden" role="alert"></div>

        <form id="admin-login-form" class="auth-form">
          <label class="field">
            <span>Tên đăng nhập Admin</span>
            <input id="admin-username" name="username" type="text" placeholder="admin" required />
          </label>

          <label class="field">
            <span>Mật khẩu</span>
            <input id="admin-password" name="password" type="password" placeholder="••••••••" required />
          </label>

          <button id="admin-login-btn" class="primary-btn primary-btn-wide" type="submit" style="background: linear-gradient(135deg, #374151 0%, #111827 100%); box-shadow: 0 18px 36px rgba(17, 24, 39, 0.26);">
            Đăng nhập hệ thống
          </button>
        </form>

        <div class="auth-footer">
          <a href="./index.html">Quay lại trang chủ</a>
        </div>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
